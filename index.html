<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 20px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  header h1 {
    font-size: 1.8em;
    background: linear-gradient(135deg, #7b2ff7, #00d4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    font-size: 0.8em;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }

  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #chat-box::-webkit-scrollbar { width: 4px; }
  #chat-box::-webkit-scrollbar-thumb { background: #7b2ff7; border-radius: 2px; }

  .message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.95em;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .user {
    align-self: flex-end;
    background: linear-gradient(135deg, #7b2ff7, #5b1fd4);
    border-bottom-right-radius: 4px;
  }

  .ai {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-bottom-left-radius: 4px;
  }

  .thinking {
    align-self: flex-start;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(123,47,247,0.3);
    border-bottom-left-radius: 4px;
    color: rgba(255,255,255,0.5);
    font-style: italic;
  }

  .bottom {
    padding: 16px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    justify-content: center;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8em;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    transition: all 0.2s;
  }

  .toggle.active {
    border-color: #7b2ff7;
    color: #a56fff;
    background: rgba(123,47,247,0.15);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #user-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 25px;
    padding: 12px 20px;
    color: #fff;
    font-size: 0.95em;
    outline: none;
    transition: border 0.2s;
  }

  #user-input:focus {
    border-color: #7b2ff7;
  }

  #user-input::placeholder { color: rgba(255,255,255,0.3); }

  button {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.2em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  #send-btn {
    background: linear-gradient(135deg, #7b2ff7, #00d4ff);
  }

  #send-btn:hover { transform: scale(1.1); }

  #mic-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
  }

  #mic-btn.listening {
    background: rgba(255, 50, 50, 0.3);
    border-color: #ff3232;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    z-index: 0;
    animation: float 8s ease-in-out infinite;
  }

  .orb1 {
    width: 400px; height: 400px;
    background: #7b2ff7;
    top: -100px; left: -100px;
    animation-delay: 0s;
  }

  .orb2 {
    width: 300px; height: 300px;
    background: #00d4ff;
    bottom: -50px; right: -50px;
    animation-delay: -4s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 30px); }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <header>
    <h1>COMPLEX</h1>
    <p>Powered by Mistral • Local & Private</p>
  </header>

  <div id="chat-box">
    <div class="message ai">👋 Hello! My name is Complex. What do you need</div>
  </div>

  <div class="bottom">
    <div class="controls">
      <div class="toggle" id="search-toggle" onclick="toggleSearch()">
        🌐 Web Search: <span id="search-status">OFF</span>
      </div>
      <div class="toggle" id="voice-toggle" onclick="toggleVoice()">
        🔊 Voice: <span id="voice-status">OFF</span>
      </div>
    </div>
    <div class="input-row">
      <button id="mic-btn" onclick="toggleMic()">🎙️</button>
      <input type="text" id="user-input" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
  let useSearch = false;
  let useVoice = false;
  let isListening = false;
  let recognition = null;

  // Setup speech recognition
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    recognition.onresult = (e) => {
      document.getElementById('user-input').value = e.results[0][0].transcript;
      stopListening();
      sendMessage();
    };
    recognition.onend = () => stopListening();
  }

  function toggleSearch() {
    useSearch = !useSearch;
    document.getElementById('search-status').textContent = useSearch ? 'ON' : 'OFF';
    document.getElementById('search-toggle').classList.toggle('active', useSearch);
  }

  function toggleVoice() {
    useVoice = !useVoice;
    document.getElementById('voice-status').textContent = useVoice ? 'ON' : 'OFF';
    document.getElementById('voice-toggle').classList.toggle('active', useVoice);
  }

  function toggleMic() {
    if (!recognition) return alert('Speech recognition not supported in this browser!');
    if (isListening) { recognition.stop(); stopListening(); }
    else { recognition.start(); startListening(); }
  }

  function startListening() {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('mic-btn').textContent = '⏹️';
  }

  function stopListening() {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('mic-btn').textContent = '🎙️';
  }

  function addMessage(text, type) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    input.value = '';

    const thinking = addMessage('🤔 Thinking...', 'thinking');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, search: useSearch })
      });

      const data = await res.json();
      thinking.remove();
      addMessage(data.reply, 'ai');

      if (useVoice) {
        const audioRes = await fetch('/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: data.reply })
        });
        const blob = await audioRes.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.play();
      }

    } catch (err) {
      thinking.remove();
      addMessage('❌ Error connecting to AI. Is the server running?', 'ai');
    }
  }
</script>
</body>
</html>
